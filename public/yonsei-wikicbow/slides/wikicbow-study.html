<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WikiCBOW — 학습용 (슬라이드 + 한국어 나레이션)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"
  onload="window.renderKatexNow && window.renderKatexNow();"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

<style>
  :root{
    --paper:#FBFAF6;--paper-soft:#F4F1E8;--ink:#1A1A1A;--ink-soft:#4A4A4A;
    --muted:#8A8A8A;--hair:#D8D5CC;--hair-soft:#E8E5DC;
    --vermillion:#B83A2C;--forest:#1B6B3A;
    --display:'Fraunces',Georgia,serif;
    --body:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--paper)}
  body{font-family:var(--body);color:var(--ink);overflow:hidden;display:flex;flex-direction:column}

  /* ─── Top bar ─── */
  .topbar{
    height:54px;background:#fff;border-bottom:1px solid var(--hair);
    display:flex;align-items:center;padding:0 24px;gap:18px;
    font-family:var(--mono);font-size:12px;color:var(--ink-soft);z-index:10;flex-shrink:0;
  }
  .topbar .brand{font-family:var(--display);font-size:18px;color:var(--ink);font-weight:500}
  .topbar .brand .glyph{color:var(--vermillion);font-style:italic}
  .topbar .tagline{color:var(--muted);font-size:11px;letter-spacing:0.06em}
  .topbar .meta{margin-left:auto;font-size:11px;color:var(--muted);letter-spacing:0.06em;display:flex;align-items:center;gap:14px}
  .topbar .meta strong{color:var(--ink);font-weight:600}

  /* mode toggle */
  .mode-toggle{
    display:flex;border:1px solid var(--hair);border-radius:4px;overflow:hidden;
    background:#fff;font-family:var(--mono);font-size:11px;
  }
  .mode-toggle button{
    background:#fff;border:none;padding:6px 12px;cursor:pointer;
    font-family:var(--mono);font-size:11px;color:var(--ink-soft);
    letter-spacing:0.06em;transition:all 120ms;
  }
  .mode-toggle button.active{background:var(--vermillion);color:#fff;font-weight:500}
  .mode-toggle button:hover:not(.active){background:var(--paper-soft);color:var(--ink)}

  /* ─── Main split ─── */
  .main{flex:1;display:grid;grid-template-columns:58% 42%;min-height:0;overflow:hidden}

  /* Left: slide iframe */
  .slide-pane{
    background:var(--paper);border-right:1px solid var(--hair);
    display:flex;flex-direction:column;min-height:0;position:relative;
  }
  .slide-pane iframe{flex:1;border:none;width:100%;height:100%}
  .slide-pane .slide-status{
    position:absolute;top:8px;left:8px;
    font-family:var(--mono);font-size:10px;color:var(--muted);
    background:rgba(255,255,255,0.85);padding:3px 8px;border-radius:3px;
    letter-spacing:0.06em;backdrop-filter:blur(4px);z-index:5;
  }
  .progress-bar{position:absolute;left:0;right:0;top:0;height:2px;background:transparent;z-index:9}
  .progress-bar .fill{height:100%;background:var(--vermillion);width:0;transition:width 220ms ease-out}

  /* Right: narration */
  .nar-pane{
    background:#fff;display:flex;flex-direction:column;min-height:0;overflow:hidden;
    position:relative;
  }
  .nar-header{
    padding:14px 22px 12px;border-bottom:1px solid var(--hair-soft);
    display:flex;align-items:baseline;gap:14px;flex-shrink:0;background:#fff;
  }
  .nar-header .num{
    font-family:var(--mono);font-size:11px;letter-spacing:0.14em;
    color:var(--muted);text-transform:uppercase;
  }
  .nar-header .title{
    font-family:var(--display);font-size:20px;font-weight:500;color:var(--ink);
    flex:1;line-height:1.2;
  }
  .nar-header .time{
    font-family:var(--mono);font-size:11.5px;color:var(--vermillion);
    background:var(--paper-soft);padding:3px 8px;border-radius:3px;font-weight:500;
  }
  .nar-header .solo-badge{
    font-family:var(--mono);font-size:10px;color:#fff;background:var(--vermillion);
    padding:2px 6px;border-radius:3px;letter-spacing:0.08em;display:none;
  }
  body.solo .nar-header .solo-badge{display:inline-block}

  /* Solo-mode mini nav inside narration header */
  .nar-mini-nav{
    display:none;align-items:center;gap:6px;margin-left:auto;
    font-family:var(--mono);font-size:11px;
  }
  body.solo .nar-mini-nav{display:flex}
  .nar-mini-nav button{
    background:#fff;border:1px solid var(--hair);border-radius:3px;
    width:24px;height:24px;cursor:pointer;font-family:var(--mono);font-size:14px;
    color:var(--ink-soft);transition:all 100ms;display:flex;align-items:center;justify-content:center;
  }
  .nar-mini-nav button:hover:not(:disabled){border-color:var(--vermillion);color:var(--vermillion)}
  .nar-mini-nav button:disabled{opacity:0.3;cursor:not-allowed}

  .nar-body{
    flex:1;overflow-y:auto;padding:18px 24px 100px;
    font-size:15.5px;line-height:1.75;color:var(--ink);
    scroll-behavior:smooth;
  }
  /* Rendered markdown */
  .nar-body h1{display:none}
  .nar-body h2{
    font-family:var(--display);font-size:19px;font-weight:500;color:var(--ink);
    margin:22px 0 10px;letter-spacing:-0.01em;
  }
  .nar-body h2:first-child{margin-top:0}
  .nar-body h3{
    font-family:var(--mono);font-size:11.5px;letter-spacing:0.12em;
    color:var(--vermillion);text-transform:uppercase;margin:18px 0 8px;font-weight:500;
  }
  .nar-body p{margin:0 0 12px;font-size:15.5px;line-height:1.7}
  .nar-body strong{color:var(--vermillion);font-weight:600}
  .nar-body em{font-style:italic;color:var(--ink-soft)}
  .nar-body code{
    font-family:var(--mono);font-size:0.85em;background:var(--paper-soft);
    padding:1px 5px;border-radius:3px;color:var(--ink);
  }
  .nar-body blockquote{
    border-left:3px solid var(--vermillion);padding:10px 16px;margin:0 0 14px;
    background:var(--paper);border-radius:0 4px 4px 0;
  }
  .nar-body blockquote p{margin:0 0 8px;font-size:15.5px}
  .nar-body blockquote p:last-child{margin-bottom:0}
  .nar-body hr{border:none;border-top:1px solid var(--hair-soft);margin:24px 0}
  .nar-body ul,.nar-body ol{padding-left:22px;margin:0 0 14px}
  .nar-body li{margin-bottom:6px;font-size:15px;line-height:1.65}
  .nar-body table{
    border-collapse:collapse;width:100%;margin:14px 0;font-size:13.5px;
    border:1px solid var(--hair-soft);
  }
  .nar-body th{
    text-align:left;font-family:var(--mono);font-size:11px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--muted);padding:8px 10px;
    border-bottom:1px solid var(--ink);background:var(--paper);
  }
  .nar-body td{padding:7px 10px;border-bottom:1px solid var(--hair-soft);font-size:13.5px;vertical-align:top}
  .nar-body td:first-child{font-family:var(--mono);color:var(--vermillion);font-weight:500;white-space:nowrap}

  /* Section markers */
  .nar-body .section-anchor{
    scroll-margin-top:20px;
    border-left:2px solid var(--vermillion);
    padding:14px 16px;background:var(--paper-soft);
    margin:24px 0 16px;border-radius:0 4px 4px 0;
  }
  .nar-body .section-anchor .anchor-label{
    font-family:var(--mono);font-size:10px;letter-spacing:0.14em;
    color:var(--vermillion);text-transform:uppercase;font-weight:600;margin-bottom:4px;
  }
  .nar-body .section-anchor h2{
    margin:0;font-size:18px;
  }

  /* ─── Bottom nav ─── */
  .navbar{
    height:60px;background:#fff;border-top:1px solid var(--hair);
    display:flex;align-items:center;padding:0 24px;gap:8px;flex-shrink:0;
  }
  .nav-btn{
    border:1px solid var(--hair);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:4px;cursor:pointer;
    font-family:var(--mono);font-size:11.5px;letter-spacing:0.04em;
    transition:all 120ms;
  }
  .nav-btn:hover:not(:disabled){border-color:var(--vermillion);color:var(--vermillion)}
  .nav-btn:disabled{opacity:0.35;cursor:not-allowed}
  .nav-dots{flex:1;display:flex;justify-content:center;gap:6px;align-items:center}
  .nav-dot{
    width:8px;height:8px;border-radius:50%;background:var(--hair);
    cursor:pointer;transition:all 120ms;border:none;padding:0;position:relative;
  }
  .nav-dot:hover{background:var(--muted);transform:scale(1.2)}
  .nav-dot.slide-active{background:var(--vermillion);transform:scale(1.4)}
  .nav-dot.nar-active::after{
    content:"";position:absolute;left:-3px;top:-3px;right:-3px;bottom:-3px;
    border:1.5px solid var(--vermillion);border-radius:50%;
  }
  .nav-dot.viewed{background:var(--ink-soft)}

  /* ─── Help text + hint ─── */
  .help-text{
    position:fixed;bottom:8px;right:14px;
    font-family:var(--mono);font-size:9.5px;color:var(--muted);
    letter-spacing:0.08em;text-transform:uppercase;user-select:none;
  }
  .help-text kbd{
    border:1px solid var(--hair);padding:1px 4px;border-radius:2px;
    background:rgba(255,255,255,0.7);font-family:var(--mono);font-size:9px;color:var(--ink-soft);margin:0 2px;
  }

  /* loading state */
  .nar-body.loading{
    display:flex;align-items:center;justify-content:center;color:var(--muted);
    font-family:var(--mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;
  }

  @media (max-width: 1000px){
    .main{grid-template-columns:1fr;grid-template-rows:50vh 1fr}
    .slide-pane{border-right:none;border-bottom:1px solid var(--hair)}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Wiki<span class="glyph">CBOW</span> · 학습용</div>
  <div class="tagline">슬라이드 + 한국어 나레이션 + 약어 발음</div>
  <div class="meta">
    <div class="mode-toggle">
      <button data-mode="sync" class="active" title="슬라이드와 나레이션 동시 이동 (← →)">🔗 Sync</button>
      <button data-mode="solo" title="나레이션만 이동 (← →), 슬라이드 별도 (Shift+← →)">📜 Solo</button>
    </div>
    <span>slide <strong id="cur-slide">1</strong> / 16</span>
    <span>nar <strong id="cur-nar">1</strong> / 16</span>
  </div>
</div>

<div class="main">
  <div class="slide-pane">
    <div class="slide-status" id="slide-status">slide 1 / 16</div>
    <div class="progress-bar"><div class="fill" id="bar"></div></div>
    <iframe id="slide-frame" src="wikicbow.html#1" title="slide"></iframe>
  </div>

  <div class="nar-pane">
    <div class="nar-header">
      <div class="num" id="nar-num">01 / 16</div>
      <div class="title" id="nar-title">Loading…</div>
      <div class="time" id="nar-time">—</div>
      <div class="solo-badge">SOLO</div>
      <div class="nar-mini-nav">
        <button id="nar-prev-mini" title="이전 나레이션">‹</button>
        <button id="nar-next-mini" title="다음 나레이션">›</button>
      </div>
    </div>
    <div class="nar-body loading" id="nar-body">나레이션 불러오는 중…</div>
  </div>
</div>

<div class="navbar">
  <button class="nav-btn" id="prev-btn">← Prev</button>
  <div class="nav-dots" id="dots"></div>
  <button class="nav-btn" id="next-btn">Next →</button>
</div>

<div class="help-text" id="help-text">
  <span class="sync-help">
    <kbd>←</kbd> <kbd>→</kbd> 둘 다 이동 &nbsp;·&nbsp;
    <kbd>↑</kbd> <kbd>↓</kbd> 나레이션 스크롤 &nbsp;·&nbsp;
    <kbd>S</kbd> 모드 토글
  </span>
</div>

<script>
const SLIDE_META = [
  { n: 1,  title: "Title",                            time: "15s" },
  { n: 2,  title: "Karpathy's LLM Wiki Pattern",      time: "25s" },
  { n: 3,  title: "My Obsidian Vault — 1,300+ Notes", time: "25s" },
  { n: 4,  title: "One Personal Feed (Vision)",       time: "25s" },
  { n: 5,  title: "Why a Small Model? — StackChan",   time: "20s" },
  { n: 6,  title: "Tiny Hardware Budget",             time: "15s" },
  { n: 7,  title: "Problem & Approach",               time: "45s" },
  { n: 8,  title: "System Architecture & Flow",       time: "60s" },
  { n: 9,  title: "Three Sources of Co-occurrence",   time: "50s" },
  { n: 10, title: "Pair Generation Formalized",       time: "75s" },
  { n: 11, title: "Loss: NS + λ Mixing",              time: "55s" },
  { n: 12, title: "Query↔Note Mapping",               time: "50s" },
  { n: 13, title: "Baselines & Corpus",               time: "40s" },
  { n: 14, title: "Results — Retrieval@k",            time: "75s" },
  { n: 15, title: "t-SNE",                            time: "50s" },
  { n: 16, title: "Caveats · LLM · Future",           time: "25s" }
];

// ============ State ============
let mode = "sync";       // "sync" | "solo"
let slideCur = 0;        // 0..10
let narCur = 0;          // 0..10
let narSections = [];    // [{n, title, time, html}]
const viewedSlides = new Set([0]);
const viewedNars = new Set([0]);

// ============ DOM refs ============
const frame      = document.getElementById('slide-frame');
const narNum     = document.getElementById('nar-num');
const narTitle   = document.getElementById('nar-title');
const narTime    = document.getElementById('nar-time');
const narBody    = document.getElementById('nar-body');
const curSlide   = document.getElementById('cur-slide');
const curNar     = document.getElementById('cur-nar');
const bar        = document.getElementById('bar');
const dotsEl     = document.getElementById('dots');
const prevBtn    = document.getElementById('prev-btn');
const nextBtn    = document.getElementById('next-btn');
const narPrevMini= document.getElementById('nar-prev-mini');
const narNextMini= document.getElementById('nar-next-mini');
const slideStatus= document.getElementById('slide-status');
const helpText   = document.getElementById('help-text');

// ============ Markdown loading + parsing ============

// Wait for marked.js (loaded as classic script, should be ready by now)
async function loadAndParseNarration() {
  try {
    const r = await fetch('narration_ko_natural.md', { cache: 'no-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    narSections = splitIntoSlides(text);
    if (narSections.length === 0) {
      throw new Error('No slide sections found in narration md');
    }
    return narSections;
  } catch (e) {
    console.error('failed to load narration:', e);
    narBody.innerHTML = `<div style="padding:30px;color:var(--vermillion);font-family:var(--mono);font-size:12px">⚠ 나레이션 로드 실패: ${e.message}<br>fallback 데이터 사용.</div>`;
    return null;
  }
}

function splitIntoSlides(md) {
  // Pattern: ## Slide N — title (Ns)   or   ## Slide N — title (N초)
  const lines = md.split(/\r?\n/);
  const slidePattern = /^## Slide (\d+)\s*[—–-]\s*(.+?)\s*\((\d+\s*[s초])\)?\s*(.*)$/i;
  const sections = [];
  const intro = [];          // 슬라이드 전 헤더 부분 (톤가이드 · 약어사전)
  const qaStart = /^## 🎤 Q&A/;
  const checklistStart = /^## 🧠 발표 직전/;

  let current = null;
  let qaBuffer = [];
  let inQA = false;
  let inChecklist = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const m = slidePattern.exec(line);
    if (m) {
      if (current) sections.push(current);
      current = {
        n: parseInt(m[1], 10),
        title: m[2].trim(),
        time: m[3].replace(/\s+/g,''),
        body: []
      };
      inQA = false;
      inChecklist = false;
      continue;
    }
    if (qaStart.test(line)) {
      if (current) { sections.push(current); current = null; }
      inQA = true;
      qaBuffer.push(line);
      continue;
    }
    if (checklistStart.test(line)) {
      inQA = false;
      inChecklist = true;
      qaBuffer.push(line);
      continue;
    }
    if (inQA || inChecklist) {
      qaBuffer.push(line);
      continue;
    }
    if (current) {
      current.body.push(line);
    } else {
      intro.push(line);
    }
  }
  if (current) sections.push(current);

  // Attach Q&A + checklist to last slide (slide 11)
  if (sections.length && qaBuffer.length) {
    sections[sections.length - 1].body.push('', ...qaBuffer);
  }

  // Render to HTML
  const m = window.marked;
  m.setOptions({ gfm:true, breaks:false });

  for (const s of sections) {
    s.html = m.parse(s.body.join('\n'));
  }
  return sections;
}

// ============ KaTeX render ============
window.renderKatexNow = function() {
  if (window.renderMathInElement) {
    try {
      window.renderMathInElement(narBody, {
        delimiters: [
          {left:'$$', right:'$$', display:true},
          {left:'$',  right:'$',  display:false}
        ],
        throwOnError: false
      });
    } catch(_) {}
  }
};

// ============ Rendering ============
function pad2(n){ return String(n).padStart(2,'0'); }

function renderNarration() {
  const s = narSections[narCur];
  if (!s) {
    narBody.innerHTML = `<div style="padding:30px;color:var(--muted);font-family:var(--mono);font-size:12px">나레이션 데이터 없음 (slide ${narCur + 1})</div>`;
    return;
  }
  const meta = SLIDE_META[narCur] || { title: s.title, time: s.time };

  narNum.textContent = `${pad2(s.n)} / 16`;
  narTitle.textContent = s.title;
  narTime.textContent = s.time;
  curNar.textContent = s.n;

  narBody.classList.remove('loading');
  narBody.innerHTML = s.html;
  narBody.scrollTop = 0;

  renderKatexNow();
}

function syncSlideFrame() {
  const targetN = slideCur + 1;
  const wantSrc = `wikicbow.html#${targetN}`;
  if (!frame.src.endsWith(wantSrc.replace(/^.*#/, '#'))) {
    frame.src = wantSrc;
  } else {
    // already set; force hash change to trigger slide change inside iframe
    try {
      if (frame.contentWindow) {
        frame.contentWindow.location.hash = String(targetN);
      }
    } catch(_) {}
  }
  curSlide.textContent = targetN;
  slideStatus.textContent = `slide ${targetN} / 16`;
  bar.style.width = ((slideCur + 1) / 16 * 100) + '%';
}

function updateDots() {
  document.querySelectorAll('.nav-dot').forEach((d, idx) => {
    d.classList.toggle('slide-active', idx === slideCur);
    d.classList.toggle('nar-active', idx === narCur);
    const isViewed = viewedSlides.has(idx) || viewedNars.has(idx);
    d.classList.toggle('viewed', isViewed && idx !== slideCur && idx !== narCur);
  });
}

function updateButtons() {
  if (mode === 'sync') {
    prevBtn.disabled = slideCur === 0;
    nextBtn.disabled = slideCur === 10;
  } else {
    prevBtn.disabled = narCur === 0;
    nextBtn.disabled = narCur === 10;
  }
  narPrevMini.disabled = narCur === 0;
  narNextMini.disabled = narCur === 10;
}

function persistHash() {
  if (mode === 'sync' && slideCur === narCur) {
    history.replaceState(null, '', `#${slideCur + 1}`);
  } else {
    history.replaceState(null, '', `#s${slideCur + 1}-n${narCur + 1}`);
  }
}

// ============ Navigation ============
function goSlide(i, andSyncNar = false) {
  i = Math.max(0, Math.min(15, i));
  slideCur = i;
  viewedSlides.add(i);
  syncSlideFrame();
  if (andSyncNar) {
    narCur = i;
    viewedNars.add(i);
    renderNarration();
  }
  updateDots();
  updateButtons();
  persistHash();
}

function goNar(i) {
  i = Math.max(0, Math.min(15, i));
  narCur = i;
  viewedNars.add(i);
  renderNarration();
  updateDots();
  updateButtons();
  persistHash();
}

function goBoth(i) {
  i = Math.max(0, Math.min(15, i));
  slideCur = i;
  narCur = i;
  viewedSlides.add(i);
  viewedNars.add(i);
  syncSlideFrame();
  renderNarration();
  updateDots();
  updateButtons();
  persistHash();
}

// ============ Mode toggle ============
function setMode(m) {
  mode = m;
  document.body.classList.toggle('solo', m === 'solo');
  document.querySelectorAll('.mode-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === m);
  });
  // update help text
  helpText.innerHTML = m === 'solo'
    ? `<kbd>←</kbd> <kbd>→</kbd> 나레이션만 &nbsp;·&nbsp; <kbd>Shift</kbd>+<kbd>←</kbd>/<kbd>→</kbd> 슬라이드만 &nbsp;·&nbsp; <kbd>=</kbd> 동기 맞추기 &nbsp;·&nbsp; <kbd>S</kbd> 모드 토글`
    : `<kbd>←</kbd> <kbd>→</kbd> 둘 다 이동 &nbsp;·&nbsp; <kbd>↑</kbd> <kbd>↓</kbd> 나레이션 스크롤 &nbsp;·&nbsp; <kbd>S</kbd> 모드 토글`;
  updateButtons();
  persistHash();
}

// ============ Init ============
async function init() {
  // Build dots
  for (let i = 0; i < 16; i++) {
    const d = document.createElement('button');
    d.className = 'nav-dot';
    d.dataset.idx = i;
    const m = SLIDE_META[i];
    d.title = `${i+1}. ${m.title}`;
    d.addEventListener('click', (e) => {
      if (mode === 'solo' && e.shiftKey) {
        goSlide(i);
      } else if (mode === 'solo') {
        goNar(i);
      } else {
        goBoth(i);
      }
    });
    dotsEl.appendChild(d);
  }

  // Mode toggle buttons
  document.querySelectorAll('.mode-toggle button').forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });

  // Nav buttons
  prevBtn.addEventListener('click', () => {
    if (mode === 'sync') goBoth(slideCur - 1);
    else goNar(narCur - 1);
  });
  nextBtn.addEventListener('click', () => {
    if (mode === 'sync') goBoth(slideCur + 1);
    else goNar(narCur + 1);
  });

  // Mini nav (always controls narration)
  narPrevMini.addEventListener('click', () => goNar(narCur - 1));
  narNextMini.addEventListener('click', () => goNar(narCur + 1));

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const k = e.key;

    if (k === 's' || k === 'S') {
      e.preventDefault();
      setMode(mode === 'sync' ? 'solo' : 'sync');
      return;
    }
    if (k === '=' || k === '+') {
      e.preventDefault();
      goBoth(narCur);  // sync slide to current narration position
      return;
    }
    if (mode === 'sync') {
      if (k === 'ArrowRight' || k === 'PageDown') { e.preventDefault(); goBoth(slideCur + 1); }
      else if (k === 'ArrowLeft' || k === 'PageUp') { e.preventDefault(); goBoth(slideCur - 1); }
      else if (k === 'Home') { e.preventDefault(); goBoth(0); }
      else if (k === 'End') { e.preventDefault(); goBoth(10); }
      // ArrowUp/Down: let it scroll narBody naturally
      else if (k === 'ArrowUp') { e.preventDefault(); narBody.scrollBy(0, -60); }
      else if (k === 'ArrowDown') { e.preventDefault(); narBody.scrollBy(0, 60); }
    } else {
      // solo mode
      if (e.shiftKey && (k === 'ArrowRight' || k === 'PageDown')) { e.preventDefault(); goSlide(slideCur + 1); }
      else if (e.shiftKey && (k === 'ArrowLeft' || k === 'PageUp')) { e.preventDefault(); goSlide(slideCur - 1); }
      else if (k === 'ArrowRight' || k === 'PageDown') { e.preventDefault(); goNar(narCur + 1); }
      else if (k === 'ArrowLeft' || k === 'PageUp') { e.preventDefault(); goNar(narCur - 1); }
      else if (k === 'Home') { e.preventDefault(); goNar(0); }
      else if (k === 'End') { e.preventDefault(); goNar(10); }
      else if (k === 'ArrowUp') { e.preventDefault(); narBody.scrollBy(0, -60); }
      else if (k === 'ArrowDown') { e.preventDefault(); narBody.scrollBy(0, 60); }
    }
  });

  // Load narration
  await loadAndParseNarration();

  // Hash init: support both #N and #sX-nY
  const h = window.location.hash.slice(1);
  let initSlide = 0, initNar = 0, initMode = 'sync';
  const m1 = /^(\d+)$/.exec(h);
  const m2 = /^s(\d+)-n(\d+)$/.exec(h);
  if (m1) {
    initSlide = initNar = Math.max(0, Math.min(15, parseInt(m1[1],10) - 1));
  } else if (m2) {
    initSlide = Math.max(0, Math.min(15, parseInt(m2[1],10) - 1));
    initNar = Math.max(0, Math.min(15, parseInt(m2[2],10) - 1));
    if (initSlide !== initNar) initMode = 'solo';
  }
  slideCur = initSlide;
  narCur = initNar;
  setMode(initMode);
  syncSlideFrame();
  renderNarration();
  updateDots();
  updateButtons();
}

// Wait for marked to be ready
function whenMarkedReady(cb) {
  if (window.marked && window.marked.parse) cb();
  else setTimeout(() => whenMarkedReady(cb), 50);
}
whenMarkedReady(init);
</script>
</body>
</html>

<!doctype html>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --paper:#FBFAF6;--paper-soft:#F4F1E8;--ink:#1A1A1A;--ink-soft:#4A4A4A;
    --muted:#8A8A8A;--hair:#D8D5CC;--hair-soft:#E8E5DC;
    --vermillion:#B83A2C;--forest:#1B6B3A;
    --display:'Fraunces',Georgia,serif;
    --body:'Pretendard Variable','Pretendard',-apple-system,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--paper)}
  body{font-family:var(--body);color:var(--ink);overflow:hidden;display:flex;flex-direction:column}

  /* Top bar */
  .topbar{
    height:54px;background:#fff;border-bottom:1px solid var(--hair);
    display:flex;align-items:center;padding:0 24px;gap:24px;
    font-family:var(--mono);font-size:12px;color:var(--ink-soft);
    z-index:10;
  }
  .topbar .brand{
    font-family:var(--display);font-size:18px;color:var(--ink);font-weight:500;
  }
  .topbar .brand .glyph{color:var(--vermillion);font-style:italic}
  .topbar .meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.06em}
  .topbar .meta strong{color:var(--ink);font-weight:600}

  /* Main split */
  .main{flex:1;display:grid;grid-template-columns:62% 38%;min-height:0;overflow:hidden}

  /* Left: slide iframe */
  .slide-pane{
    background:var(--paper);border-right:1px solid var(--hair);
    display:flex;flex-direction:column;min-height:0;position:relative;
  }
  .slide-pane iframe{flex:1;border:none;width:100%;height:100%}

  /* Right: narration */
  .nar-pane{
    background:#fff;display:flex;flex-direction:column;min-height:0;
    overflow:hidden;
  }
  .nar-header{
    padding:18px 24px 12px;border-bottom:1px solid var(--hair-soft);
    display:flex;align-items:baseline;gap:14px;
  }
  .nar-header .num{
    font-family:var(--mono);font-size:11px;letter-spacing:0.14em;
    color:var(--muted);text-transform:uppercase;
  }
  .nar-header .title{
    font-family:var(--display);font-size:21px;font-weight:500;color:var(--ink);
    flex:1;line-height:1.2;
  }
  .nar-header .time{
    font-family:var(--mono);font-size:12px;color:var(--vermillion);
    background:var(--paper-soft);padding:3px 8px;border-radius:3px;font-weight:500;
  }

  .nar-body{
    flex:1;overflow-y:auto;padding:20px 24px 80px;
    font-size:15.5px;line-height:1.7;color:var(--ink);
  }
  .nar-body .section-label{
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;
    color:var(--vermillion);text-transform:uppercase;margin:18px 0 8px;font-weight:500;
  }
  .nar-body .section-label:first-child{margin-top:0}
  .nar-body .quote{
    border-left:3px solid var(--vermillion);padding:8px 14px;margin:0;
    background:var(--paper);font-family:var(--body);color:var(--ink);
    border-radius:0 4px 4px 0;
  }
  .nar-body .quote p{margin-bottom:8px}
  .nar-body .quote p:last-child{margin-bottom:0}
  .nar-body .quote strong{font-weight:600;color:var(--vermillion)}
  .nar-body .quote em{font-style:italic;color:var(--ink-soft)}

  .math-meanings{
    margin-top:8px;
    background:var(--paper);
    border:1px solid var(--hair-soft);border-radius:4px;
    padding:12px 16px;
  }
  .math-meanings .label{
    font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;
    color:var(--muted);text-transform:uppercase;margin-bottom:8px;
  }
  .math-meanings .row{
    display:flex;align-items:flex-start;gap:10px;
    padding:6px 0;border-bottom:1px dashed var(--hair-soft);
    font-size:14px;line-height:1.5;
  }
  .math-meanings .row:last-child{border-bottom:none}
  .math-meanings .row .symbol{
    font-family:var(--mono);color:var(--vermillion);font-weight:500;
    flex-shrink:0;width:100px;font-size:13px;
  }
  .math-meanings .row .meaning{color:var(--ink-soft)}

  /* Bottom nav */
  .navbar{
    height:64px;background:#fff;border-top:1px solid var(--hair);
    display:flex;align-items:center;padding:0 24px;gap:8px;
  }
  .nav-btn{
    border:1px solid var(--hair);background:#fff;color:var(--ink);
    padding:8px 14px;border-radius:4px;cursor:pointer;
    font-family:var(--mono);font-size:11.5px;letter-spacing:0.04em;
    transition:all 120ms;
  }
  .nav-btn:hover:not(:disabled){border-color:var(--vermillion);color:var(--vermillion)}
  .nav-btn:disabled{opacity:0.4;cursor:not-allowed}
  .nav-dots{
    flex:1;display:flex;justify-content:center;gap:6px;align-items:center;
  }
  .nav-dot{
    width:8px;height:8px;border-radius:50%;background:var(--hair);
    cursor:pointer;transition:all 120ms;border:none;padding:0;
  }
  .nav-dot:hover{background:var(--muted)}
  .nav-dot.active{background:var(--vermillion);transform:scale(1.4)}
  .nav-dot.viewed{background:var(--ink-soft)}

  .progress-bar{
    position:absolute;left:0;right:0;top:0;height:2px;background:transparent;z-index:9;
  }
  .progress-bar .fill{height:100%;background:var(--vermillion);width:0;transition:width 220ms ease-out}

  /* Help text */
  .help-text{
    position:fixed;bottom:8px;right:14px;
    font-family:var(--mono);font-size:9.5px;color:var(--muted);
    letter-spacing:0.08em;text-transform:uppercase;user-select:none;
  }
  .help-text kbd{
    border:1px solid var(--hair);padding:1px 4px;border-radius:2px;
    background:rgba(255,255,255,0.7);font-family:var(--mono);font-size:9px;color:var(--ink-soft);margin:0 2px;
  }

  /* Mobile fallback */
  @media (max-width: 900px){
    .main{grid-template-columns:1fr;grid-template-rows:50vh 1fr}
    .slide-pane{border-right:none;border-bottom:1px solid var(--hair)}
  }
</style>

const QA = [
  ["Q1. 왜 hetero-DeepWalk 안 했어요?", "솔직히 시간 문제예요. 본 모델에서 위키링크가 36개밖에 해석이 안 됐는데, random walk 베이스로 가려면 그래프가 충분히 dense 해야 해서요. **scope 를 PARA 1-4 전체로 넓힌 다음** 다시 시도할 계획이고요, 그건 후속 작업으로 빼뒀습니다."],
  ["Q2. P@1 = 1.00 너무 잘 나온 거 아닌가요?", "맞습니다, 의심하실 만해요. 평가 라벨이 B5+TFIDF top-2 에서 부트스트랩됐기 때문에 B6=1.00 에는 일부 tautology 가 있어요. **수동으로 라벨 refine 하면 0.65~0.75 정도로 떨어질 거라 예상** 합니다. 다만 B0 (0.40), B1 (0.45) 와의 *상대 차이* 는 부트스트랩과 무관해서 그래프 신호의 기여 자체는 유효합니다."],

// =========== Render ============
function mdToHTML(text){
  // very small markdown: **bold**, *italic*, `code`, line breaks
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

const frame = document.getElementById('slide-frame');
const narNum = document.getElementById('nar-num');
const narTitle = document.getElementById('nar-title');
const narTime = document.getElementById('nar-time');
const narBody = document.getElementById('nar-body');
const curNum = document.getElementById('cur-num');
const curTime = document.getElementById('cur-time');
const bar = document.getElementById('bar');
const dotsEl = document.getElementById('dots');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

let cur = 0;
const viewed = new Set([0]);

// Build dots
SLIDES.forEach((s, i) => {
  const d = document.createElement('button');
  d.className = 'nav-dot';
  d.dataset.idx = i;
  d.title = `${i+1}. ${s.title}`;
  d.addEventListener('click', () => show(i));
  dotsEl.appendChild(d);
});

function renderNarration(s) {
  let html = '';
  for (const [label, text] of (s.narration || [])) {
    html += `<div class="section-label">${label}</div>`;
    html += `<blockquote class="quote"><p>${mdToHTML(text)}</p></blockquote>`;
  }

  if (s.formulas && s.formulas.length) {
    html += `<div class="math-meanings">`;
    html += `<div class="label">수식 의미 한 줄</div>`;
    for (const [sym, mean] of s.formulas) {
      html += `<div class="row"><div class="symbol">${sym}</div><div class="meaning">${mean}</div></div>`;
    }
    html += `</div>`;
  }

  // Last slide gets Q&A appended
  if (s.n === 11) {
    html += `<div class="section-label">Q&amp;A 대비 (5문항)</div>`;
    for (const [q, a] of QA) {
      html += `<div style="margin-bottom:14px"><div style="font-weight:600;color:var(--vermillion);font-size:14px;margin-bottom:4px">${q}</div>`;
      html += `<blockquote class="quote" style="font-size:14px">${mdToHTML(a)}</blockquote></div>`;
    }
  }

  narBody.innerHTML = html;
}

function show(i) {
  if (i < 0 || i >= SLIDES.length) return;
  cur = i;
  viewed.add(i);
  const s = SLIDES[i];

  // update iframe
  frame.src = `wikicbow.html#${s.n}`;

  // update right pane
  narNum.textContent = String(s.n).padStart(2, '0') + ' / 11';
  narTitle.textContent = s.title;
  narTime.textContent = `${s.time}s`;
  curNum.textContent = s.n;
  curTime.textContent = `${s.time}s`;

  renderNarration(s);
  narBody.scrollTop = 0;

  // dots
  document.querySelectorAll('.nav-dot').forEach((d, idx) => {
    d.classList.toggle('active', idx === i);
    d.classList.toggle('viewed', viewed.has(idx) && idx !== i);
  });

  // bar
  bar.style.width = ((i + 1) / SLIDES.length * 100) + '%';

  // buttons
  prevBtn.disabled = i === 0;
  nextBtn.disabled = i === SLIDES.length - 1;

  // url hash
  history.replaceState(null, '', '#' + s.n);
}

prevBtn.addEventListener('click', () => show(cur - 1));
nextBtn.addEventListener('click', () => show(cur + 1));

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); show(cur + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); show(cur - 1); }
  else if (e.key === 'Home') { e.preventDefault(); show(0); }
  else if (e.key === 'End') { e.preventDefault(); show(SLIDES.length - 1); }
});

// Init from hash
const hashN = parseInt(window.location.hash.slice(1), 10);
if (!isNaN(hashN) && hashN >= 1 && hashN <= SLIDES.length) {
  show(hashN - 1);
} else {
  show(0);
}
</script>
